<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Reformas</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <!-- CSS básico para evitar el error 404 -->
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; padding: 20px; max-width: 900px; margin: 0 auto; }
        label { display: inline-block; width: 260px; margin-top: 10px; vertical-align: top; }
        input[type="text"], input[type="number"], input[type="date"], input[type="tel"], input[type="email"], 
        textarea, select { width: 400px; padding: 6px; margin-bottom: 10px; }
        button { padding: 12px 25px; font-size: 16px; margin-top: 15px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background: #45a049; }
        #resultado { margin-top: 25px; padding: 15px; border: 2px solid #4CAF50; border-radius: 8px; background: #f9fff9; }
        div[id^="detalle_"] { margin-left: 30px; margin-top: 8px; }
    </style>
</head>
<body>

<form id="form-reformas">
    <h2>Formulario de Reformas</h2>

    <label>Fecha:</label>
    <input type="date" name="fecha" required><br>
    
    <label>Nombre:</label>
    <input type="text" name="nombre" required><br>
    
    <label>Dirección:</label>
    <textarea name="direccion" required></textarea><br>
    
    <label>Teléfono:</label>
    <input type="tel" name="telefono" required><br>
    
    <label>Email:</label>
    <input type="email" name="email" required><br>
    
    <label>Disponibilidad para visita:</label>
    <textarea name="disponibilidad" required></textarea><br>

    <label>¿Es una reforma integral?</label>
    <input type="checkbox" name="reforma_integral"><br>
    
    <label>¿Cuántos m² aproximados?</label>
    <input type="number" name="m2" required><br>
    
    <label>¿Nº habitaciones?</label>
    <input type="number" name="habitaciones"><br>
    
    <label>¿Nº baños?</label>
    <input type="number" name="banos"><br>
    
    <label>¿En qué consiste la obra?</label>
    <textarea name="consiste_obra"></textarea><br>
    
    <label>¿Dispuesto a invertir >50.000€?</label>
    <input type="checkbox" name="inversion_mayor"><br>
    
    <label>¿Buscando calidad o precio?</label>
    <select name="calidad_precio">
        <option value="calidad">Calidad</option>
        <option value="precio">Precio</option>
    </select><br>
    
    <label>¿Estilo en mente?</label>
    <textarea name="estilo"></textarea><br>
    
    <label>¿Cuándo empezar la obra?</label>
    <input type="text" name="fecha_inicio_obra" id="calendario-inicio" required><br>

    <label>¿Hay ascensor?</label>
    <input type="checkbox" name="ascensor"><br>
    
    <label>¿Dispone de plano?</label>
    <input type="radio" name="plano" value="si" id="plano_si"> Sí
    <input type="radio" name="plano" value="no" id="plano_no" checked> No<br>
    
    <div id="upload_plano" style="display:none;">
        <label>Subir plano:</label>
        <input type="file" name="plano_file">
    </div>
    
    <div id="estancias_texto" style="display:none;">
        <label>Enumerar estancias:</label>
        <textarea name="estancias"></textarea>
    </div>

    <label>¿Cambios de distribución?</label>
    <input type="checkbox" name="cambios_distribucion"><br>
    
    <label>¿Reforma integral cocina?</label>
    <input type="checkbox" name="reforma_cocina"><br>
    
    <label>¿Recupera algo en cocina?</label>
    <input type="checkbox" name="recupera_cocina"><br>
    
    <label>¿Reforma integral baños?</label>
    <input type="checkbox" name="reforma_banos_integral"><br>
    
    <label>¿Recupera algo en baños?</label>
    <input type="checkbox" name="recupera_banos"><br>
    
    <label>¿Renovación fontanería?</label>
    <input type="checkbox" name="renovacion_fontaneria"><br>

    <div style="margin-top:1.5em;">
        <label>¿Renovación calefacción?</label><br>
        <input type="radio" name="renovacion_calefaccion" value="no" id="calef_no" checked> No<br>
        <input type="radio" name="renovacion_calefaccion" value="si" id="calef_si"> Sí
    </div>

    <div id="detalle_calefaccion" style="display:none; margin-left:20px;">
        <label>¿Cambiar caldera?</label><br>
        <input type="radio" name="cambiar_caldera" value="no" checked> No<br>
        <input type="radio" name="cambiar_caldera" value="si"> Sí
    </div>

    <label>¿Renovación electricidad?</label>
    <input type="checkbox" name="renovacion_electricidad"><br>
    
    <label>¿Instalación comunitaria?</label>
    <input type="checkbox" name="instalacion_comunitaria"><br>
    
    <label>¿Aire acondicionado?</label>
    <input type="checkbox" name="aire_acondicionado"><br>
    
    <label>Tipo de A/C:</label>
    <input type="text" name="tipo_ac"><br>

    <!-- Carpintería exterior -->
    <div style="margin-top:1.5em;">
        <label>¿Cambios carpintería exterior?</label><br>
        <input type="radio" name="cambios_carpinteria_exterior" value="no" id="carp_ext_no" checked> No<br>
        <input type="radio" name="cambios_carpinteria_exterior" value="si" id="carp_ext_si"> Sí
    </div>

    <div id="detalle_carp_exterior" style="display:none; margin-left:20px;">
        <label>¿Cuántos elementos hay que cambiar?</label><br>
        <input type="number" name="cambios_carpinteria_exterior_cuantos"><br>
    </div>

    <!-- Carpintería interior -->
    <div style="margin-top:1.5em;">
        <label>¿Cambios carpintería interior?</label><br>
        <input type="radio" name="cambios_carpinteria_interior" value="no" id="carp_int_no" checked> No<br>
        <input type="radio" name="cambios_carpinteria_interior" value="si" id="carp_int_si"> Sí
    </div>

    <div id="detalle_carp_interior" style="display:none; margin-left:20px;">
        <label>¿Cuántos elementos hay que cambiar?</label><br>
        <input type="number" name="cambios_carpinteria_interior_cuantos"><br>
    </div>

    <div id="detalle_rodapie" style="display:none; margin-left:20px;">
        <label>¿Instalar o cambiar rodapié?</label><br>
        <input type="radio" name="rodapie" value="no" checked> No<br>
        <input type="radio" name="rodapie" value="si"> Sí
    </div>

    <!-- Suelo -->
    <div style="margin-top:1.5em;">
        <label>¿Vas a cambiar el suelo?</label><br>
        <input type="radio" name="cambios_suelo" value="no" id="suelo_no" checked> No<br>
        <input type="radio" name="cambios_suelo" value="si" id="suelo_si"> Sí
    </div>

    <div id="detalle_suelo" style="display:none; margin-left:20px;">
        <label>Tipo de suelo:</label><br>
        <input type="radio" name="tipo_solado" value="tarima"> Tarima<br>
        <input type="radio" name="tipo_solado" value="ceramico"> Cerámico
    </div>

    <label>¿Cambios techo?</label>
    <input type="checkbox" name="cambios_techo"><br>
    
    <label>¿Falso techo?</label>
    <input type="checkbox" name="falso_techo"><br>

    <button type="submit">Enviar y Calcular</button>
</form>

<div id="resultado"></div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="js/reformas-script.js"></script>

</body>
</html>
